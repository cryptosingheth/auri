  <!-- Auri "ai" lettermark, no tile. Big single-story 'a' whose right stem doubles as the 'i'
       stem. The dawn mark (wordmark's tapered sun-ray + rising-sun DOT) stands out just above
       the HEAD of the 'a' — the "eye" peeking a little outside the top. Expanded it reads Auri,
       contracted it reads ai. Counter is a true transparent hole (evenodd). -->
  <g fill="url(#ai)">
    <path fill-rule="evenodd" d="M7.5 31a15.5 15.5 0 1 1 31 0a15.5 15.5 0 1 1 -31 0ZM15.3 31a7.7 7.7 0 1 1 15.4 0a7.7 7.7 0 1 1 -15.4 0Z"/>
