<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fa_tile" x1="16" y1="0" x2="16" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#94275B"/>
      <stop offset="1" stop-color="#6B1940"/>
    </linearGradient>
    <linearGradient id="fa_gold" x1="16" y1="5" x2="16" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3E6C4"/>
      <stop offset=".5" stop-color="#E7D0A0"/>
      <stop offset="1" stop-color="#D0B06E"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#fa_tile)"/>
  <!-- single-story 'a' drawn from the auri wordmark: circle bowl + right stem, flat terminals -->
  <g fill="url(#fa_gold)">
    <circle cx="16" cy="16" r="10.6"/>
    <rect x="21.4" y="6" width="5.2" height="20"/>
  </g>
  <!-- counter punched back to the tile (userSpaceOnUse gradient keeps it seamless) -->
  <circle cx="16" cy="16" r="5.4" fill="url(#fa_tile)"/>
</svg>
